docs: |-
  Cette ressource permet de récupérer une liste d’approbateurs métier.
  Vous pouvez filtrer, si besoin, pour recevoir une liste spécifique d’approbateurs métier.
  Si aucun approbateur n’est trouvé, un tableau vide sera retourné.
