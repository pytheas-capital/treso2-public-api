info:
  name: Créer un approbateur métier
  type: http
  seq: 1
  tags:
    - Business_Validators

http:
  method: POST
  url: "{{baseUrl}}/v3/business-validators"
  body:
    type: json
    data: |-
      {
        "validatorEmail": "",
        "internalCode": "",
        "subsidiaryRegistrationId": "80770824300066 ou MONACOXXX00000",
        "validatorFirstName": "",
        "validatorLastName": "",
        "nextValidatorEmail": "",
        "rank": "",
        "parentBusinessUnitCode": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Response
    description: L'approbateur métier a été créé avec succès. Le corps de la réponse contient l'identifiant unique généré par TRESO2 (businessValidatorId) pour cet approbateur.
    request:
      url: "{{baseUrl}}/v3/business-validators"
      method: POST
      body:
        type: json
        data: |-
          {
            "validatorEmail": "",
            "internalCode": "",
            "subsidiaryRegistrationId": "80770824300066 ou MONACOXXX00000",
            "validatorFirstName": "",
            "validatorLastName": "",
            "nextValidatorEmail": "",
            "rank": "",
            "parentBusinessUnitCode": ""
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "businessValidatorId": ""
          }
  - name: 400 Response
    description: Une erreur de validation de la donnée en entrée est survenue ou la requête est mal formée
    request:
      url: "{{baseUrl}}/v3/business-validators"
      method: POST
      body:
        type: json
        data: |-
          {
            "validatorEmail": "",
            "internalCode": "",
            "subsidiaryRegistrationId": "80770824300066 ou MONACOXXX00000",
            "validatorFirstName": "",
            "validatorLastName": "",
            "nextValidatorEmail": "",
            "rank": "",
            "parentBusinessUnitCode": ""
          }
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 401 Response
    description: L'utilisateur n'est pas authentifié
    request:
      url: "{{baseUrl}}/v3/business-validators"
      method: POST
      body:
        type: json
        data: |-
          {
            "validatorEmail": "",
            "internalCode": "",
            "subsidiaryRegistrationId": "80770824300066 ou MONACOXXX00000",
            "validatorFirstName": "",
            "validatorLastName": "",
            "nextValidatorEmail": "",
            "rank": "",
            "parentBusinessUnitCode": ""
          }
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
  - name: 403 Response
    description: L'utilisateur n'est pas autorisé à effectuer l'action
    request:
      url: "{{baseUrl}}/v3/business-validators"
      method: POST
      body:
        type: json
        data: |-
          {
            "validatorEmail": "",
            "internalCode": "",
            "subsidiaryRegistrationId": "80770824300066 ou MONACOXXX00000",
            "validatorFirstName": "",
            "validatorLastName": "",
            "nextValidatorEmail": "",
            "rank": "",
            "parentBusinessUnitCode": ""
          }
    response:
      status: 403
      statusText: Forbidden
      body:
        type: text
        data: ""
  - name: 500 Response
    description: Une erreur de serveur inattendue s'est produite
    request:
      url: "{{baseUrl}}/v3/business-validators"
      method: POST
      body:
        type: json
        data: |-
          {
            "validatorEmail": "",
