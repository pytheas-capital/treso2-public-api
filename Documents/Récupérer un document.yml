info:
  name: Récupérer un document
  type: http
  seq: 2
  tags:
    - Documents

http:
  method: GET
  url: "{{baseUrl}}/v3/documents/:invoiceId"
  params:
    - name: invoiceId
      value: "123e4567-e89b-12d3-a456-426614174000"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Le document a été récupéré avec succès
    request:
      url: "{{baseUrl}}/v3/documents/:invoiceId"
      method: GET
      params:
        - name: invoiceId
          value: "123e4567-e89b-12d3-a456-426614174000"
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: text
        data: "<binary file stream omitted>"
  - name: 400 Response
    description: Une erreur de validation de la donnée en entrée est survenue ou la requête est mal formée
    request:
      url: "{{baseUrl}}/v3/documents/:invoiceId"
      method: GET
      params:
        - name: invoiceId
          value: "123e4567-e89b-12d3-a456-426614174000"
          type: path
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 401 Response
    description: L'utilisateur n'est pas authentifié
    request:
      url: "{{baseUrl}}/v3/documents/:invoiceId"
      method: GET
      params:
        - name: invoiceId
          value: "123e4567-e89b-12d3-a456-426614174000"
          type: path
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
  - name: 403 Response
    description: L'utilisateur n'est pas autorisé à effectuer l'action
    request:
      url: "{{baseUrl}}/v3/documents/:invoiceId"
      method: GET
      params:
        - name: invoiceId
          value: "123e4567-e89b-12d3-a456-426614174000"
          type: path
    response:
      status: 403
      statusText: Forbidden
      body:
        type: text
        data: ""
  - name: 500 Response
    description: Une erreur de serveur inattendue s'est produite
    request:
      url: "{{baseUrl}}/v3/documents/:invoiceId"
      method: GET
      params:
        - name: invoiceId
          value: "123e4567-e89b-12d3-a456-426614174000"
          type: path
    response:
      status: 500
      statusText: Internal Server Error
      body:
        type: text
        data: ""
