http:
  method: PUT
  url: "{{baseUrl}}/v3/business-units/:businessUnitId"
  params:
    - name: businessUnitId
      value: "BU-2026-001"
      type: path
      description: Identifiant unique du centre d’affaire au sein de TRESO2
  body:
    type: json
    data: |-
      {
        "validatorEmail": "chantier.manager@pytheas.fr",
        "internalCode": "ETAB-001",
        "subsidiaryRegistrationId": "80770824300066",
        "businessUnitCode": "CHANTIER-2026-001",
        "parentBusinessUnitCode": "AGENCE-LILLE"
      }
  auth: inherit

settings:
