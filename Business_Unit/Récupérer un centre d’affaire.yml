info:
  name: Récupérer un centre d’affaire
  type: http
  seq: 3
  tags:
    - Business_Unit

http:
  method: GET
  url: "{{baseUrl}}/v3/business-units/:businessUnitId"
  params:
    - name: businessUnitId
      value: ""
      type: path
      description: |-
        Identifiant unique du centre d’affaire au sein de TRESO2. 
        Pour le récupérer, vous pouvez effectuer une recherche à partir de la route "Récupérer une liste de centres d'affaire".
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

