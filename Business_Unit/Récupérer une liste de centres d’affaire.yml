info:
  name: Récupérer une liste de centres d’affaire
  type: http
  seq: 2
  tags:
    - Business_Unit

http:
  method: GET
  url: "{{baseUrl}}/v3/business-units"
  params:
    - name: offset
      value: "1"
      type: query
      description: Numéro de page souhaité
    - name: limit
      value: "25"
      type: query
      description: Nombre d'éléments à retourner par page (Maximum 100)
    - name: validator_email
      value: "chantier.manager@pytheas.fr"
      type: query
      description: Email du responsable en charge du centre d'affaire (chantier, mission, programme…)
      disabled: true
    - name: sort
      value: updatedAt-asc
      type: query
      description: Tri par nom de champ, suffixer avec '-asc' pour ascendant et '-desc' pour descendant
      disabled: true
    - name: sort
      value: updatedAt-desc
      type: query
      description: Tri par nom de champ, suffixer avec '-asc' pour ascendant et '-desc' pour descendant
      disabled: true
    - name: sort
      value: createdAt-asc
      type: query
      description: Tri par nom de champ, suffixer avec '-asc' pour ascendant et '-desc' pour descendant
      disabled: true
    - name: sort
      value: createdAt-desc
      type: query
      description: Tri par nom de champ, suffixer avec '-asc' pour ascendant et '-desc' pour descendant
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

