info:
  name: Créer un centre d’affaire
  type: http
  seq: 1
  tags:
    - Business_Unit

http:
  method: POST
  url: "{{baseUrl}}/v3/business-units"
  body:
    type: json
    data: |-
      {
        "validatorEmail": "",
        "internalCode": "",
        "subsidiaryRegistrationId": "80770824300066 ou MONACOXXX00000",
        "businessUnitCode": "",
        "parentBusinessUnitCode": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Response
    description: Le code du centre d’affaire (chantier, mission, programme…) a été créé avec succès. Le corps de la réponse contient son identifiant unique au sein de TRESO2.
    request:
      url: "{{baseUrl}}/v3/business-units"
      method: POST
      body:
        type: json
        data: |-
          {
            "validatorEmail": "",
            "internalCode": "",
            "subsidiaryRegistrationId": "80770824300066 ou MONACOXXX00000",
            "businessUnitCode": "",
            "parentBusinessUnitCode": ""
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "businessUnitId": ""
          }
