  type: http
  seq: 5
  tags:
    - Vat_Codes

http:
  method: DELETE
  url: "{{baseUrl}}/v3/vat-codes/:vatCodeId"
  params:
    - name: vatCodeId
      value: "VAT-2026-001"
      type: path
  auth: inherit

settings:
