http:
  method: PATCH
  url: "{{baseUrl}}/v3/vat-codes/:vatCodeId"
  params:
    - name: vatCodeId
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "code": "VAT_20",
        "label": "TVA 20%",
        "percentage": 20,
        "countryCode": "FR",
        "vatCollectedAccount": "445710",
        "vatDeductibleAccount": "445660",
        "active": true
      }
  auth: inherit

settings:
