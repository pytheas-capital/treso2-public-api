  - name: 401 Response
    description: L'utilisateur n'est pas authentifié
    request:
      url: "{{baseUrl}}/v3/vat-codes"
      method: POST
      body:
        type: json
        data: |-
          {
            "code": "VAT_20",
            "label": "TVA 20%",
            "percentage": 20,
