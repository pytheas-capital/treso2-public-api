info:
  name: Créer un code TVA
  type: http
  seq: 2
  tags:
    - Vat_Codes

http:
  method: POST
  url: "{{baseUrl}}/v3/vat-codes"
  body:
    type: json
    data: |-
      {
        "code": "VAT_20",
        "label": "TVA 20%",
        "percentage": 20,
        "countryCode": "FR",
        "vatCollectedAccount": "445710",
        "vatDeductibleAccount": "445660",
        "active": true,
        "company": {
              "companyRegistrationId": "807708243",
              "subsidiaryRegistrationId": "80770824300066"
            }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Response
    description: Le code TVA créé
    request:
      url: "{{baseUrl}}/v3/vat-codes"
      method: POST
      body:
        type: json
        data: |-
          {
            "code": "VAT_20",
            "label": "TVA 20%",
            "percentage": 20,
            "countryCode": "FR",
            "vatCollectedAccount": "445710",
            "vatDeductibleAccount": "445660",
            "active": true,
            "company": {
              "companyRegistrationId": "807708243",
              "subsidiaryRegistrationId": "80770824300066"
            }
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "createdAt": "2026-04-01T09:00:00.000Z",
            "createdAtTS": 1711962000000,
            "updatedAt": "2026-04-02T10:15:00.000Z",
            "updatedAtTS": 1712052900000,
            "vatCodeId": "VAT-2026-001",
            "companyId": "0199cd10-4c11-7199-b0df-6747d1f3691a",
            "code": "VAT_20",
            "label": "TVA 20%",
            "percentage": 20,
            "countryCode": "FR",
            "vatCollectedAccount": "445710",
            "vatDeductibleAccount": "445660",
            "active": true
