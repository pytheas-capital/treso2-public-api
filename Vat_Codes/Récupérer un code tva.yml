info:
  name: Récupérer un code tva
  type: http
  seq: 3
  tags:
    - Vat_Codes

http:
  method: GET
  url: "{{baseUrl}}/v3/vat-codes/:vatCodeId"
  params:
    - name: vatCodeId
      value: "VAT-2026-001"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Le code tva
    request:
      url: "{{baseUrl}}/v3/vat-codes/:vatCodeId"
      method: GET
      params:
        - name: vatCodeId
          value: "VAT-2026-001"
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "createdAt": "2026-04-01T09:00:00.000Z",
            "createdAtTS": 1711962000000,
            "updatedAt": "2026-04-02T10:15:00.000Z",
            "updatedAtTS": 1712052900000,
            "vatCodeId": "VAT-2026-001",
            "companyId": "0199cd10-4c11-7199-b0df-6747d1f3691a",
            "code": "VAT_20",
            "label": "TVA 20%",
            "percentage": 20,
            "countryCode": "FR",
            "vatCollectedAccount": "445710",
            "vatDeductibleAccount": "445660",
            "active": true
          }
  - name: 400 Response
    description: Une erreur de validation de la donnée en entrée est survenue ou la requête est mal formée
    request:
      url: "{{baseUrl}}/v3/vat-codes/:vatCodeId"
      method: GET
      params:
        - name: vatCodeId
          value: "VAT-2026-001"
          type: path
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 401 Response
    description: L'utilisateur n'est pas authentifié
    request:
      url: "{{baseUrl}}/v3/vat-codes/:vatCodeId"
      method: GET
      params:
        - name: vatCodeId
          value: "VAT-2026-001"
          type: path
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
  - name: 403 Response
    description: L'utilisateur n'est pas autorisé à effectuer l'action
    request:
      url: "{{baseUrl}}/v3/vat-codes/:vatCodeId"
      method: GET
      params:
        - name: vatCodeId
          value: "VAT-2026-001"
          type: path
    response:
      status: 403
      statusText: Forbidden
