info:
  name: Récupérer un bon de réception avec un id
  type: http
  seq: 3
  tags:
    - Receipt_Slips

http:
  method: GET
  url: "{{baseUrl}}/v3/receipt-slips/:receiptSlipId"
  params:
    - name: receiptSlipId
      value: "RSID-2024-001"
      type: path
      description: Identifiant du bon de réception auto généré par la plateforme
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Le bon de réception demandé
    request:
      url: "{{baseUrl}}/v3/receipt-slips/:receiptSlipId"
      method: GET
      params:
        - name: receiptSlipId
          value: "RSID-2024-001"
          type: path
          description: Identifiant du bon de réception auto généré par la plateforme
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "createdAt": "",
            "createdAtTS": 0,
            "updatedAt": "",
            "updatedAtTS": 0,
            "receiptSlipId": "",
            "documentId": "",
            "purchaseOrderId": "",
            "seller": "",
            "buyer": "",
            "status": {},
            "receptionDate": "",
            "totalAmount": 0,
            "totalAmountTaxExcluded": 0,
            "totalAmountTax": 0,
            "currency": {},
            "note": "",
            "lines": [
              {
                "reference": "",
                "quantity": 0,
                "description": "",
                "unit": {},
                "unitPriceHT": 0,
                "taxRate": 0
              }
            ],
            "filename": ""
          }
  - name: 401 Response
    description: L'utilisateur n'est pas authentifié
    request:
      url: "{{baseUrl}}/v3/receipt-slips/:receiptSlipId"
      method: GET
      params:
        - name: receiptSlipId
          value: "RSID-2024-001"
          type: path
          description: Identifiant du bon de réception auto généré par la plateforme
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
  - name: 403 Response
    description: L'utilisateur n'est pas autorisé à effectuer l'action
    request:
      url: "{{baseUrl}}/v3/receipt-slips/:receiptSlipId"
      method: GET
      params:
        - name: receiptSlipId
          value: "RSID-2024-001"
          type: path
          description: Identifiant du bon de réception auto généré par la plateforme
    response:
      status: 403
