  - name: 500 Response
    description: Une erreur de serveur inattendue s'est produite
    request:
      url: "{{baseUrl}}/v3/receipt-slips/:receiptSlipId"
      method: GET
      params:
        - name: receiptSlipId
          value: "RSID-2024-001"
          type: path
          description: Identifiant du bon de réception auto généré par la plateforme
