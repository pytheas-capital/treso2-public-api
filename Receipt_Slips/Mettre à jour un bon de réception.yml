info:
  name: Mettre à jour un bon de réception
  type: http
  seq: 4
  tags:
    - Receipt_Slips

http:
  method: PATCH
  url: "{{baseUrl}}/v3/receipt-slips/:receiptSlipId"
  params:
    - name: receiptSlipId
      value: "RSID-2024-001"
      type: path
  body:
    type: json
    data: |-
      {
        "documentId": "BR-2024-001",
        "purchaseOrderId": "PO-2024-001",
        "status": "RECEIVED",
        "receptionDate": "2024-01-15T10:00:00Z",
        "totalAmount": 120,
        "totalAmountTaxExcluded": 100,
        "totalAmountTax": 20,
        "currency": "EUR",
        "note": "Livraison conforme",
        "lines": [
          {
            "reference": "REF001",
            "quantity": 2,
            "description": "Produit de test",
            "unit": "KGM",
            "unitPriceHT": 25.5,
            "taxRate": 20
          }
        ],
        "seller": "",
        "buyer": "",
        "sellerId": "",
        "buyerId": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

