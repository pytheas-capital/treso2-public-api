info:
  name: Annuler un bon de réception
  type: http
  seq: 5
  tags:
    - Receipt_Slips

http:
  method: DELETE
  url: "{{baseUrl}}/v3/receipt-slips/:receiptSlipId"
  params:
    - name: receiptSlipId
      value: "RSID-2024-001"
      type: path
      description: Identifiant du bon de réception auto généré par la plateforme
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

