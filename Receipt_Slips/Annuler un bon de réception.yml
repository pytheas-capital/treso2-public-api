    description: Bon de réception annulé avec succès
    request:
      url: "{{baseUrl}}/v3/receipt-slips/:receiptSlipId"
      method: DELETE
      params:
        - name: receiptSlipId
          value: "RSID-2024-001"
          type: path
          description: Identifiant du bon de réception auto généré par la plateforme
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": true,
            "message": "Receipt slip canceled successfully"
          }
