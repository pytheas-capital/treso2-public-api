info:
  name: Supprimer la relation entre le fournisseur et le client
  type: http
  seq: 1
  tags:
    - Relationships

http:
  method: DELETE
  url: "{{baseUrl}}/v3/relationships"
  params:
    - name: customer_id
      value: "0199cd10-4c11-7199-b0df-6747d1f3691a"
      type: query
      description: Identifiant unique du client. Pour le récupérer, vous pouvez effectuer une recherche à partir de la route "Récupérer une liste de fournisseurs ou un tableau vide".
    - name: supplier_id
      value: "0199cd10-4c11-7199-b0df-6747d1f3691b"
      type: query
      description: Identifiant unique du fournisseur. Pour le récupérer, vous pouvez effectuer une recherche à partir de la route "Récupérer une liste de fournisseurs ou un tableau vide".
    - name: type
      value: supplier
      type: query
      description: Type d'entreprise dans la relation qui doit être supprimée
    - name: type
      value: customer
      type: query
      description: Type d'entreprise dans la relation qui doit être supprimée
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

