info:
  name: Récupérer un compte comptable
  type: http
  seq: 3
  tags:
    - Ledger_Accounts

http:
  method: GET
  url: "{{baseUrl}}/v3/ledger-accounts/:ledgerAccountId"
  params:
    - name: ledgerAccountId
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Le compte comptable
    request:
      url: "{{baseUrl}}/v3/ledger-accounts/:ledgerAccountId"
      method: GET
      params:
        - name: ledgerAccountId
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "createdAt": "",
            "createdAtTS": 0,
            "updatedAt": "",
            "updatedAtTS": 0,
            "ledgerAccountId": "",
            "number": "",
            "label": "",
            "active": false,
            "companyId": ""
          }
  - name: 400 Response
    description: Une erreur de validation de la donnée en entrée est survenue ou la requête est mal formée
    request:
      url: "{{baseUrl}}/v3/ledger-accounts/:ledgerAccountId"
      method: GET
      params:
        - name: ledgerAccountId
          value: ""
          type: path
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 401 Response
    description: L'utilisateur n'est pas authentifié
    request:
      url: "{{baseUrl}}/v3/ledger-accounts/:ledgerAccountId"
      method: GET
      params:
        - name: ledgerAccountId
          value: ""
          type: path
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
  - name: 403 Response
    description: L'utilisateur n'est pas autorisé à effectuer l'action
    request:
      url: "{{baseUrl}}/v3/ledger-accounts/:ledgerAccountId"
      method: GET
      params:
        - name: ledgerAccountId
          value: ""
          type: path
    response:
      status: 403
      statusText: Forbidden
      body:
        type: text
        data: ""
  - name: 500 Response
    description: Une erreur de serveur inattendue s'est produite
    request:
      url: "{{baseUrl}}/v3/ledger-accounts/:ledgerAccountId"
      method: GET
      params:
        - name: ledgerAccountId
          value: ""
          type: path
    response:
      status: 500
      statusText: Internal Server Error
      body:
        type: text
        data: ""

docs: Cette ressource permet de récupérer un compte comptable d'une entreprise.
