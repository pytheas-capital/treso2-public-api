      description: Tri par nom de champ, suffixer avec '-asc' pour ascendant et '-desc' pour descendant
      disabled: true
    - name: sort
      value: number-asc
      type: query
      description: Tri par nom de champ, suffixer avec '-asc' pour ascendant et '-desc' pour descendant
      disabled: true
    - name: sort
      value: number-desc
      type: query
      description: Tri par nom de champ, suffixer avec '-asc' pour ascendant et '-desc' pour descendant
      disabled: true
    - name: sort
      value: label-asc
      type: query
      description: Tri par nom de champ, suffixer avec '-asc' pour ascendant et '-desc' pour descendant
      disabled: true
    - name: sort
      value: label-desc
      type: query
      description: Tri par nom de champ, suffixer avec '-asc' pour ascendant et '-desc' pour descendant
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

