info:
  name: Récupérer les comptes comptables
  type: http
  seq: 1
  tags:
    - Ledger_Accounts

http:
  method: GET
  url: "{{baseUrl}}/v3/ledger-accounts"
  params:
    - name: offset
      value: "1"
      type: query
      description: Numéro de page souhaité
    - name: limit
      value: "25"
      type: query
      description: Nombre d'éléments à retourner par page (Maximum 100)
    - name: companyRegistrationId
      value: 807708243 ou 12345678A
      type: query
      description: Identifiant de l'entreprise (SIREN, NIF, DUNS). Veuillez sélectionner l'identifiant de la maison mère.
    - name: subsidiaryRegistrationId
      value: 80770824300066 ou MONACOXXX00000
      type: query
      description: Identifiant de l'établissement (SIRET). Veuillez sélectionner l'identifiant de la maison mère. Ce champs est REQUIRED si la maison mère comporte plusieurs SIRET.
    - name: number
      value: ""
      type: query
      description: Numéro du compte comptable
      disabled: true
    - name: label
      value: ""
      type: query
      description: Label du compte comptable
      disabled: true
    - name: active
      value: ""
      type: query
      description: Statut du compte comptable
      disabled: true
    - name: sort
      value: updatedAt-asc
      type: query
      description: Tri par nom de champ, suffixer avec '-asc' pour ascendant et '-desc' pour descendant
      disabled: true
    - name: sort
      value: updatedAt-desc
      type: query
      description: Tri par nom de champ, suffixer avec '-asc' pour ascendant et '-desc' pour descendant
      disabled: true
    - name: sort
      value: createdAt-asc
