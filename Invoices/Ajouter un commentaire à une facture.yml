info:
  name: Ajouter un commentaire à une facture
  type: http
  seq: 11
  tags:
    - Invoices

http:
  method: POST
  url: "{{baseUrl}}/v3/invoices/:invoiceId/comments"
  params:
    - name: invoiceId
      value: "123e4567-e89b-12d3-a456-426614174000"
      type: path
      description: Identifiant unique de la facture (UUID)
  body:
    type: json
    data: |-
      {
        "comment": "Invoice reviewed and approved for publication"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

