docs: |-
  Récupérer une liste paginée de factures avec filtres optionnels.

  **Pagination:**
  - `offset`: Page (base 1, défaut: 1)
  - `limit`: Nombre de résultats par page (défaut: 50, max: 200)

  **Filtres disponibles:**
  - `invoicing_context`: B2Bd, B2Bi, B2G, B2C
  - `seller_id`, `buyer_id`: ID vendeur/acheteur
  - `issue_date_from`, `issue_date_to`: Plage de dates d'émission
  - `status`: Codes statut DGFIP
  - `item_type`: Types de document (380, 384, 386)
  - Et plus...

  **Champs personnalisés:**
  - `custom_fields`: Filtrer par valeurs de champs personnalisés (SINGLE et MULTIPLE uniquement)
  - Exemple: `?custom_fields[internalKey]=value1&custom_fields[department]=sales`

  **Tri:**
  - `sort`: Tableau de champs (ex: issueDate-desc, dueDate-asc)

  **Projection:**
  - `fields`: Tableau de champs à inclure dans la réponse
  - Exclure `payments` via projection pour alléger la réponse si non nécessaire
