info:
  name: Ajouter un paiement à une facture
  type: http
  seq: 15
  tags:
    - Invoices

http:
  method: PATCH
  url: "{{baseUrl}}/v3/invoices/:invoiceId/payments"
  params:
    - name: invoiceId
      value: "123e4567-e89b-12d3-a456-426614174000"
      type: path
      description: Identifiant unique de la facture (UUID)
  body:
    type: json
    data: |-
      {
        "amount": 1000,
        "date": "2026-01-27",
        "reference": "PAY-2026-001",
        "notes": "Partial payment received via bank transfer"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
