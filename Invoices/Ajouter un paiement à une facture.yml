docs: |-
  Ajouter un événement de paiement à une facture existante.

  **Champs requis:**
  - `amount`: Montant du paiement
  - `date`: Date du paiement (ISO 8601)

  **Champs optionnels:**
  - `reference`: Référence du paiement (persistée dans l'historique)
  - `notes`: Notes du paiement (persistées dans l'historique)

  **Comportement:**
  - Met à jour le champ `payment.paidAmount` de la facture (somme cumulée)
  - Met à jour le champ `payment.date` avec la date du paiement
  - Ajoute une entrée dans `payments[]` pour l'audit (ID stable `UUID v7`)
  - Retourne un warning si le paiement dépasse le solde restant (overpayment)
