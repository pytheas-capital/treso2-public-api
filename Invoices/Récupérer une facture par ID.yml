info:
  name: Récupérer une facture par ID
  type: http
  seq: 8
  tags:
    - Invoices

http:
  method: GET
  url: "{{baseUrl}}/v3/invoices/:invoiceId"
  params:
    - name: invoiceId
      value: 123e4567-e89b-12d3-a456-426614174000
      type: path
      description: Identifiant unique de la facture (UUID)
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

