docs: |-
  Récupérer les détails complets d'une facture via son identifiant.

  La réponse conserve les rôles de parties documentés par le contrat public v3; les blocs métier visibles ne doivent pas être interprétés comme des alias dédupliqués.

  Si la facture n'est pas trouvée, une erreur 404 sera retournée.
