info:
  name: Soumettre un événement de cycle de vie de facture
  type: http
  seq: 17
  tags:
    - Invoices

http:
  method: POST
  url: "{{baseUrl}}/v3/invoices/:invoiceId/lifecycle-events"
  body:
    type: json
    data: |-
      {
        "processConditionCode": "205",
        "comment": "Approved by buyer"
      }
  params:
    - name: invoiceId
      value: ""
      type: path
      description: Identifiant unique de la facture (UUID)
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

