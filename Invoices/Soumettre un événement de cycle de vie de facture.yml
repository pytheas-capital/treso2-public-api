    description: Événement de cycle de vie invalide
    request:
      url: "{{baseUrl}}/v3/invoices/:invoiceId/lifecycle-events"
      method: POST
      params:
        - name: invoiceId
          value: "123e4567-e89b-12d3-a456-426614174000"
