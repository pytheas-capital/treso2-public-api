info:
  name: Soumettre un événement de cycle de vie de facture
  type: http
  seq: 17
  tags:
    - Invoices

http:
  method: POST
  url: "{{baseUrl}}/v3/invoices/:invoiceId/lifecycle-events"
  body:
    type: json
    data: |-
      {
        "processConditionCode": "206",
        "comment": "Suspended pending supporting documents",
        "eventData": {
          "reasonCode": "MISSING_SUPPORTING_DOCUMENT",
          "reason": "Awaiting signed delivery receipt"
        }
      }
  params:
    - name: invoiceId
      value: "123e4567-e89b-12d3-a456-426614174000"
      type: path
      description: Identifiant unique de la facture (UUID)
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: L'événement de cycle de vie a été appliqué
    request:
      url: "{{baseUrl}}/v3/invoices/:invoiceId/lifecycle-events"
      method: POST
      params:
        - name: invoiceId
          value: "123e4567-e89b-12d3-a456-426614174000"
          type: path
          description: Identifiant unique de la facture (UUID)
      body:
        type: json
        data: |-
          {
            "processConditionCode": "205",
            "comment": "Approved by buyer"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "invoiceId": "123e4567-e89b-12d3-a456-426614174000",
            "invoiceDirection": "outgoing",
            "appliedEvent": {
              "processConditionCode": "205",
              "label": "Approved",
              "comment": "Approved by buyer",
              "appliedAt": "2026-04-08T14:20:00.000Z"
            },
            "cdar": {
              "generated": true,
              "status": "queued"
            }
          }
  - name: 200 Response (206 suspended)
    description: Un événement suspendu avec données complémentaires a été appliqué.
    request:
      url: "{{baseUrl}}/v3/invoices/:invoiceId/lifecycle-events"
      method: POST
      params:
        - name: invoiceId
          value: "123e4567-e89b-12d3-a456-426614174000"
          type: path
          description: Identifiant unique de la facture (UUID)
      body:
        type: json
        data: |-
          {
            "processConditionCode": "206",
            "comment": "Suspended pending supporting documents",
            "eventData": {
              "reasonCode": "MISSING_SUPPORTING_DOCUMENT",
              "reason": "Awaiting signed delivery receipt"
            }
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "invoiceId": "123e4567-e89b-12d3-a456-426614174000",
            "invoiceDirection": "outgoing",
            "appliedEvent": {
              "processConditionCode": "206",
              "label": "Suspended",
              "comment": "Suspended pending supporting documents",
              "appliedAt": "2026-04-24T09:30:00.000Z"
            },
            "cdar": {
              "generated": true,
              "status": "queued"
            }
          }
  - name: 200 Response (211 payment sent)
    description: Un événement de paiement transmis a été appliqué.
    request:
      url: "{{baseUrl}}/v3/invoices/:invoiceId/lifecycle-events"
      method: POST
      params:
        - name: invoiceId
          value: "123e4567-e89b-12d3-a456-426614174000"
          type: path
          description: Identifiant unique de la facture (UUID)
      body:
        type: json
        data: |-
          {
            "processConditionCode": "211",
            "comment": "Payment instruction sent",
            "eventData": {
              "paymentInfo": {
                "amount": 1410,
                "currency": "EUR",
                "paymentDate": "2026-04-24"
              }
            }
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "invoiceId": "123e4567-e89b-12d3-a456-426614174000",
            "invoiceDirection": "outgoing",
            "appliedEvent": {
              "processConditionCode": "211",
              "label": "Payment sent",
              "comment": "Payment instruction sent",
              "appliedAt": "2026-04-24T10:15:00.000Z"
            },
            "cdar": {
              "generated": true,
              "status": "generated"
            }
          }
