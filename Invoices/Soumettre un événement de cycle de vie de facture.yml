docs: |-
  Soumettre un événement actionnable du cycle de vie d'une facture.

  **Exemples de codes supportés:**
  - `204` prise en charge
  - `205` approuvée
  - `206` suspendue (`eventData.reasonCode`, `eventData.reason`)
  - `207` litige (`eventData.reasonCode`, `eventData.reason`)
  - `211` paiement transmis (`eventData.paymentInfo.amount`, `currency`, `paymentDate`)
  - `213` partiellement approuvée
  - `214` complétée
  - `224` demande de paiement direct
  - `225` cession / affacturage notifié

  **Note:**
  - pour `225`, `226`, `227` et `228`, fournir `eventData.effectiveDate` ainsi que les champs métier requis par le code choisi
