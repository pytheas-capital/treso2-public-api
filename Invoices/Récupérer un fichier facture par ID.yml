info:
  name: Récupérer un fichier facture par ID
  type: http
  seq: 5
  tags:
    - Invoices

http:
  method: GET
  url: "{{baseUrl}}/v3/invoices/:invoiceId/files/:format"
  params:
    - name: format
      value: ubl
      type: path
      description: Format du fichier généré à récupérer
    - name: invoiceId
      value: 123e4567-e89b-12d3-a456-426614174000
      type: path
      description: Identifiant unique de la facture (UUID)
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Le fichier généré est prêt et streamé via l’API publique
    request:
      url: "{{baseUrl}}/v3/invoices/:invoiceId/files/:format"
      method: GET
      params:
        - name: format
          value: facturx
          type: path
        - name: invoiceId
          value: 123e4567-e89b-12d3-a456-426614174000
          type: path
          description: Identifiant unique de la facture (UUID)
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/pdf
      body:
        type: text
        data: "%PDF-1.7 … fichier binaire streamé par l'API …"
  - name: 202 Response
    description: Le fichier est encore en cours de génération
    request:
      url: "{{baseUrl}}/v3/invoices/:invoiceId/files/:format"
      method: GET
      params:
        - name: format
          value: facturx
          type: path
        - name: invoiceId
          value: 123e4567-e89b-12d3-a456-426614174000
          type: path
          description: Identifiant unique de la facture (UUID)
    response:
      status: 202
      statusText: Accepted
      body:
        type: text
        data: ""
  - name: 400 Response
    description: Format de fichier non pris en charge
    request:
      url: "{{baseUrl}}/v3/invoices/:invoiceId/files/:format"
      method: GET
      params:
        - name: format
          value: xml
          type: path
        - name: invoiceId
          value: 123e4567-e89b-12d3-a456-426614174000
          type: path
          description: Identifiant unique de la facture (UUID)
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 401 Response
    description: L'utilisateur n'est pas authentifié
    request:
      url: "{{baseUrl}}/v3/invoices/:invoiceId/files/:format"
      method: GET
      params:
        - name: format
          value: facturx
          type: path
        - name: invoiceId
          value: 123e4567-e89b-12d3-a456-426614174000
          type: path
          description: Identifiant unique de la facture (UUID)
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
  - name: 403 Response
    description: L'utilisateur n'est pas autorisé à effectuer l'action
    request:
      url: "{{baseUrl}}/v3/invoices/:invoiceId/files/:format"
      method: GET
      params:
        - name: format
          value: facturx
          type: path
        - name: invoiceId
          value: 123e4567-e89b-12d3-a456-426614174000
          type: path
          description: Identifiant unique de la facture (UUID)
    response:
      status: 403
      statusText: Forbidden
      body:
        type: text
        data: ""
  - name: 404 Response
    description: Facture introuvable
    request:
      url: "{{baseUrl}}/v3/invoices/:invoiceId/files/:format"
      method: GET
      params:
        - name: format
          value: facturx
          type: path
        - name: invoiceId
          value: 123e4567-e89b-12d3-a456-426614174000
          type: path
          description: Identifiant unique de la facture (UUID)
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""
  - name: 422 Response
    description: La génération a échoué de façon terminale
    request:
      url: "{{baseUrl}}/v3/invoices/:invoiceId/files/:format"
      method: GET
      params:
        - name: format
          value: facturx
          type: path
        - name: invoiceId
          value: 123e4567-e89b-12d3-a456-426614174000
          type: path
          description: Identifiant unique de la facture (UUID)
    response:
      status: 422
      statusText: Unprocessable Entity
      body:
        type: text
        data: ""
  - name: 500 Response
    description: Une erreur de serveur inattendue s'est produite
    request:
      url: "{{baseUrl}}/v3/invoices/:invoiceId/files/:format"
      method: GET
      params:
        - name: format
          value: facturx
          type: path
        - name: invoiceId
          value: 123e4567-e89b-12d3-a456-426614174000
          type: path
          description: Identifiant unique de la facture (UUID)
    response:
      status: 500
      statusText: Internal Server Error
      body:
        type: text
        data: ""
  - name: 503 Response
    description: Le fichier est marqué prêt mais le stockage est indisponible
    request:
      url: "{{baseUrl}}/v3/invoices/:invoiceId/files/:format"
      method: GET
      params:
        - name: format
          value: facturx
          type: path
        - name: invoiceId
          value: 123e4567-e89b-12d3-a456-426614174000
          type: path
          description: Identifiant unique de la facture (UUID)
    response:
      status: 503
      statusText: Service Unavailable
      body:
        type: text
        data: ""

docs: |-
  Récupérer un fichier généré pour une facture via l’API publique.

  **Formats pris en charge:**
  - `ubl`
  - `cii`
  - `facturx`

  **Comportement:**
  - `200` si le fichier est prêt et streamé directement par l’API
  - `202` si la génération est encore en cours
  - `422` si la génération a échoué de façon terminale
  - `503` si le stockage est indisponible malgré un fichier marqué prêt
