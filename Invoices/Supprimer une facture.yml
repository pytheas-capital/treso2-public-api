docs: |-
  Supprimer une facture existante.

  **Comportement:**
  - Suppression logique (soft delete) - la facture est marquée comme supprimée
  - La facture n'apparaîtra plus dans les listes
  - Les données sont conservées pour audit

  **Restrictions:**
  - Seules les factures en statut brouillon (0) peuvent être supprimées
  - Les factures transmises ne peuvent pas être supprimées
