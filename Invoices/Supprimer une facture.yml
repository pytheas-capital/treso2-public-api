info:
  name: Supprimer une facture
  type: http
  seq: 8
  tags:
    - Invoices

http:
  method: DELETE
  url: "{{baseUrl}}/v3/invoices/:invoiceId"
  params:
    - name: invoiceId
      value: ""
      type: path
      description: Identifiant unique de la facture (UUID)
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

