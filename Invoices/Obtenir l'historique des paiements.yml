info:
  name: Obtenir l'historique des paiements
  type: http
  seq: 14
  tags:
    - Invoices

http:
  method: GET
  url: "{{baseUrl}}/v3/invoices/:invoiceId/payments"
  params:
    - name: invoiceId
      value: ""
      type: path
      description: Identifiant unique de la facture (UUID)
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Historique des paiements de la facture
    request:
      url: "{{baseUrl}}/v3/invoices/:invoiceId/payments"
      method: GET
      params:
        - name: invoiceId
          value: ""
          type: path
          description: Identifiant unique de la facture (UUID)
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "count": 3,
            "totalPaid": 800,
            "remainingAmount": 400,
            "payments": [
              {
                "id": "0199f8b0-1c2d-4f3e-b2d0-123456789abc",
                "amount": 500,
                "date": "2026-02-01",
                "method": "bank_transfer",
                "reference": "PAY-2026-001",
                "notes": "Partial payment via bank transfer",
                "createdAt": "2026-02-01T10:30:00.000Z",
                "createdBy": "user@example.com"
              }
            ]
          }
  - name: 401 Response
    description: L'utilisateur n'est pas authentifié
    request:
      url: "{{baseUrl}}/v3/invoices/:invoiceId/payments"
      method: GET
      params:
        - name: invoiceId
          value: ""
          type: path
          description: Identifiant unique de la facture (UUID)
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
  - name: 403 Response
    description: L'utilisateur n'est pas autorisé à effectuer l'action
    request:
      url: "{{baseUrl}}/v3/invoices/:invoiceId/payments"
      method: GET
      params:
        - name: invoiceId
          value: ""
          type: path
          description: Identifiant unique de la facture (UUID)
    response:
      status: 403
      statusText: Forbidden
      body:
        type: text
        data: ""
  - name: 404 Response
    description: Facture non trouvée
    request:
      url: "{{baseUrl}}/v3/invoices/:invoiceId/payments"
      method: GET
      params:
        - name: invoiceId
          value: ""
          type: path
          description: Identifiant unique de la facture (UUID)
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""
  - name: 500 Response
    description: Une erreur de serveur inattendue s'est produite
    request:
      url: "{{baseUrl}}/v3/invoices/:invoiceId/payments"
      method: GET
      params:
        - name: invoiceId
          value: ""
          type: path
          description: Identifiant unique de la facture (UUID)
    response:
      status: 500
      statusText: Internal Server Error
      body:
        type: text
        data: ""

docs: |-
  Récupérer l'historique complet des paiements pour une facture.

  **Retourne:**
  - Liste de tous les paiements avec montants, dates et références
  - Total payé et montant restant
