info:
  name: Supprimer le workflow de validation pour une facture
  type: http
  seq: 14
  tags:
    - Invoices

http:
  method: DELETE
  url: "{{baseUrl}}/v3/invoices/:invoiceId/abort-validation"
  params:
    - name: invoiceId
      value: ""
      type: path
      description: Identifiant unique de la facture (UUID)
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Workflow supprimé avec succès
    request:
      url: "{{baseUrl}}/v3/invoices/:invoiceId/abort-validation"
