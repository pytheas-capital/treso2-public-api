docs: |-
  Supprimer le workflow de validation métier d'une facture.

  **Cycle de vie:**
  - réservé aux factures finales ayant un workflow actif
  - ne modifie pas les champs BT-* métier de la facture
  - garde les règles d'éligibilité workflow cohérentes avec le comportement v2
