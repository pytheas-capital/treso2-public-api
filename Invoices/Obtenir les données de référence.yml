info:
  name: Obtenir les données de référence
  type: http
  seq: 1
  tags:
    - Invoices

http:
  method: GET
  url: "{{baseUrl}}/v3/invoices/metadata"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Données de référence avec descriptions bilingues
    request:
      url: "{{baseUrl}}/v3/invoices/metadata"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "currencies": [
              {
                "code": "EUR",
                "name": "Euro"
              }
            ],
            "countryCodes": [
              {
                "code": "FR",
                "name": "France",
                "isEU": true
              }
            ],
            "vatTypeCodes": [
              {
                "code": "380",
                "description": ""
              }
            ],
            "documentTypes": [
              {}
            ],
            "operationCategories": [
              {
                "code": "380",
                "description": "",
                "validContexts": [
                  "B2Bd",
                  "B2Bi",
                  "B2G",
                  "B2C"
                ]
              }
            ],
            "paymentMethods": [
              {}
            ],
            "unitCodes": [
              {}
            ],
            "vatExemptionCodes": [
              {}
            ],
            "invoiceNoteCodes": [
              {}
            ],
            "vatDueDateCodes": [
              {}
            ],
            "invoicingContexts": [
              {}
            ],
            "profiles": [
              {}
            ],
            "pdpStatuses": [
              {
                "code": 225,
                "description": ""
              }
            ],
            "validVatRates": [
              0,
              2.1,
              5.5,
              10,
              20
            ]
          }
  - name: 401 Response
    description: L'utilisateur n'est pas authentifié
    request:
      url: "{{baseUrl}}/v3/invoices/metadata"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
  - name: 403 Response
    description: L'utilisateur n'est pas autorisé à effectuer l'action
    request:
      url: "{{baseUrl}}/v3/invoices/metadata"
      method: GET
    response:
      status: 403
      statusText: Forbidden
      body:
        type: text
        data: ""
  - name: 500 Response
    description: Une erreur de serveur inattendue s'est produite
    request:
      url: "{{baseUrl}}/v3/invoices/metadata"
      method: GET
    response:
      status: 500
      statusText: Internal Server Error
      body:
        type: text
        data: ""

docs: |-
  Récupérer toutes les données de référence pour les factures avec descriptions bilingues (EN + FR).

  **Données incluses:**
  - Devises (ISO 4217)
  - Codes pays (ISO 3166)
  - Codes type TVA (UNTDID 5305)
  - Types de document (UNTDID 1001)
  - Catégories d'opération (BT-23)
  - Méthodes de paiement (UNTDID 4461)
  - Codes unité (UN/CEFACT Rec. 20)
  - Codes exonération TVA (CEF VATEX)
  - Codes note facture (UNTDID 4451)
  - Codes date exigibilité TVA (UNTDID 2005)
  - Contextes de facturation (B2Bd, B2Bi, B2G, B2C)
  - Taux de TVA valides
