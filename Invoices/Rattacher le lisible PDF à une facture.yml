docs: |-
  Rattacher ou remplacer le lisible PDF d'une facture.

  **Cycle de vie:**
  - autorisé sur brouillon
  - autorisé sur facture finale uniquement tant qu'aucun lisible n'a encore été téléversé
  - remplacement interdit sur facture finale après premier téléversement
  - ne modifie aucun champ BT-* métier
  - met uniquement à jour la pièce jointe lisible exposée avec la facture
