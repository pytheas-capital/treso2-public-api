info:
  name: Rattacher le lisible PDF à une facture
  type: http
  seq: 12
  tags:
    - Invoices

http:
  method: POST
  url: "{{baseUrl}}/v3/invoices/:invoiceId/readable"
  params:
    - name: invoiceId
      value: ""
      type: path
      description: Identifiant unique de la facture (UUID)
  body:
    type: multipart-form
    data:
      - name: name
        type: text
        value: invoice-readable.pdf
      - name: file
        type: file
        value: []
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

