docs: |-
  Créez un brouillon de facture avec le même schéma de requête que `POST /v3/invoices`.

  **Cycle de vie:**
  - créez la facture avec le statut brouillon
  - utilisez ce brouillon comme point d’entrée pour les opérations PATCH et DELETE
  - appliquez les mêmes règles métier et la même sémantique de parties que pour `POST /v3/invoices`
