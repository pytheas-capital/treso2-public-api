docs: |-
  Créez une nouvelle facture conforme à la réforme de la facturation électronique (EN16931).

  **Contextes de facturation (discriminant: invoicingContext):**
  - **B2Bd** - Interentreprises domestique : France vers France
    - renseignez `buyer.companyRegistrationId` (SIREN)
    - renseignez `buyer.electronicAddress` avec la valeur du point d’adressage ; utilisez généralement `0225` pour `buyer.electronicAddressSchemeId` lorsqu’un schéma est fourni
    - ne renseignez pas `buyer.vat`
  - **B2Bi** - Interentreprises international : France vers étranger ou étranger vers France
    - renseignez `buyer.companyRegistrationId` avec l’identifiant légal
    - renseignez `buyer.electronicAddress` avec la valeur du point d’adressage et `buyer.electronicAddressSchemeId` avec le schéma du réseau utilisé
    - renseignez `buyer.vat` uniquement pour un acheteur établi dans l’Union européenne
  - **B2G** - Vers le secteur public : vers administration publique
    - renseignez `buyerReference`
    - renseignez `seller.name`, `seller.address` et `buyer.name`
    - renseignez `seller.subsidiaryRegistrationId` (SIRET)
    - renseignez explicitement les champs d’adresse électronique et de schéma d’identification seller/buyer attendus par ce contrat
    - n’utilisez pas les blocs `buyerAgent` et `invoicee` dans ce contexte
    - prévoyez les informations complémentaires nécessaires aux exigences du secteur public
    - utilisez le flux Chorus Pro
  - **B2C** - Vers particulier : vers particulier
    - renseignez `buyer.firstName` et `buyer.lastName`
    - ne renseignez pas `buyer.companyRegistrationId`, `buyer.subsidiaryRegistrationId` ni `buyer.vat`

  **Sémantique des parties:**
  - utilisez `seller` pour identifier l’émetteur de la facture
  - utilisez `buyer` pour identifier l’acheteur
  - utilisez `invoicee` lorsque le destinataire de la facture est différent de l’acheteur, par exemple pour un siège facturé pour le compte d’un établissement ou d’une entité opérationnelle distincte
  - utilisez `payer` lorsqu’un tiers règle la facture, par exemple en cas de tiers payant ou d’organisation payeuse distincte
  - utilisez `thirdPartyInvoicer` lorsqu’un tiers émet la facture pour le compte du vendeur, par exemple en cas de mandat de facturation ou de plateforme mandatée
  - utilisez `payee` lorsque le bénéficiaire du paiement est différent du vendeur, par exemple en cas d’affacturage
  - en B2G, limitez le bloc `payee` aux identifiants `SIREN/SIRET` pris en charge par ce contrat public
  - utilisez les informations de paiement pour décrire les modalités de règlement, sans remplacer les blocs métier dédiés

  **Règles métier:**
  - appliquez les mêmes règles métier à la création standard et à la création en brouillon
  - utilisez, pour les identifiants d’entreprise ou d’adressage électronique, un schéma reconnu par le cadre de facturation électronique
  - utilisez `subsidiaryRegistrationSchemeId` uniquement avec la valeur `0009` et avec `subsidiaryRegistrationId`
  - renseignez le schéma associé lorsqu’un identifiant est requis
  - attendez-vous à un refus si les informations fournies ne respectent pas les exigences applicables au contexte `B2Bd`, `B2Bi`, `B2G` ou `B2C`

  **Note:** Le champ `total.paidAmount` est en lecture seule et sera ignoré à la création.
