docs: |-
  Mettre à jour les champs d'une facture existante.

  **Note:** Seuls les champs fournis seront mis à jour. Les champs non fournis conservent leur valeur actuelle.

  **Restrictions:**
  - Le contexte de facturation (`invoicingContext`) ne peut pas être modifié
  - Le champ `total.paidAmount` est en lecture seule (utiliser PATCH .../payments)
  - Les champs de schéma optionnels des blocs `seller` / `buyer` peuvent être effacés avec `null`; les champs requis par le contexte rejettent toujours `null`
  - La mise à jour respecte les règles de validation du contexte
  - Les opérations PATCH ne doivent pas être documentées comme un mécanisme de fusion ou de substitution implicite entre rôles de parties
