    description: Le brouillon de facture a été publié avec succès
    request:
      url: "{{baseUrl}}/v3/invoices/:invoiceId/publish"
      method: POST
      params:
        - name: invoiceId
          value: "123e4567-e89b-12d3-a456-426614174000"
          type: path
          description: Identifiant unique de la facture (UUID)
    response:
