info:
  name: Publier un brouillon de facture
  type: http
  seq: 7
  tags:
    - Invoices

http:
  method: POST
  url: "{{baseUrl}}/v3/invoices/:invoiceId/publish"
  params:
    - name: invoiceId
      value: ""
      type: path
      description: Identifiant unique de la facture (UUID)
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
