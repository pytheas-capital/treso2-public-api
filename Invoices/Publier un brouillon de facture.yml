docs: |-
  Publier un brouillon de facture pour le faire passer vers son cycle de vie final.

  **Comportement:**
  - réservé aux factures encore en brouillon
  - ne retourne pas de payload en cas de succès (`204`)
  - échoue si la facture n'est pas dans un état publiable
