info:
  name: Récupérer un client
  type: http
  seq: 3
  tags:
    - Customers

http:
  method: GET
  url: "{{baseUrl}}/v3/customers/:companyId"
  params:
    - name: companyId
      value: "0199cd10-4c11-7199-b0df-6747d1f3691a"
      type: path
    - name: supplierRegistrationId
      value: "807708243"
      type: query
      description: Identifiant de l'entreprise fournisseur (SIREN)
    - name: supplierSubsidiaryRegistrationId
      value: "80770824300066"
      type: query
      description: Identifiant de l'établissement (SIRET)
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

