info:
  name: Récupérer une liste de clients ou un tableau vide
  type: http
  seq: 2
  tags:
    - Customers

http:
  method: GET
  url: "{{baseUrl}}/v3/customers"
  params:
    - name: offset
      value: "1"
      type: query
      description: Numéro de page souhaité
    - name: limit
      value: "25"
      type: query
      description: Nombre d'éléments à retourner par page (Maximum 100)
    - name: createdAt
      value: ""
      type: query
      disabled: true
    - name: updatedAt
      value: ""
      type: query
      disabled: true
    - name: sort
      value: updatedAt-asc
      type: query
      description: Tri par nom de champ, suffixer avec '-asc' pour ascendant et '-desc' pour descendant
      disabled: true
    - name: sort
      value: updatedAt-desc
      type: query
      description: Tri par nom de champ, suffixer avec '-asc' pour ascendant et '-desc' pour descendant
      disabled: true
    - name: sort
      value: createdAt-asc
      type: query
      description: Tri par nom de champ, suffixer avec '-asc' pour ascendant et '-desc' pour descendant
      disabled: true
    - name: sort
      value: createdAt-desc
      type: query
      description: Tri par nom de champ, suffixer avec '-asc' pour ascendant et '-desc' pour descendant
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

