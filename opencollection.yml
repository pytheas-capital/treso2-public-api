opencollection: 1.0.0

info:
  name: Treso2 Public API
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: oauth2
    flow: client_credentials
    accessTokenUrl: "{{accessTokenUrl}}"
    credentials:
      clientId: "{{clientId}}"
      clientSecret: "{{clientSecret}}"
      placement: body
    scope: openid
    tokenConfig:
      id: credentials
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: true
      autoRefreshToken: false
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
