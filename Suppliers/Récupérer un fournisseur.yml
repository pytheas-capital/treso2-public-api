docs: |-
  Cette ressource permet de recevoir un fournisseur via son identifiant.

  Si le fournisseur est lié a plusieurs de vos entreprises, une liste de fournisseurs sera retournée.

  Si le fournisseur n'est pas trouvée, une erreur 404 sera retournée.
