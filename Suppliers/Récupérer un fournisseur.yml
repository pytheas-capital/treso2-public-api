info:
  name: Récupérer un fournisseur
  type: http
  seq: 3
  tags:
    - Suppliers

http:
  method: GET
  url: "{{baseUrl}}/v3/suppliers/:companyId"
  params:
    - name: companyId
      value: ""
      type: path
    - name: customerRegistrationId
      value: "123456789"
      type: query
      description: Identifiant de l'entreprise cliente (SIREN)
    - name: customerSubsidiaryRegistrationId
      value: "1234567890123"
      type: query
      description: Identifiant de l'établissement (SIRET)
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

