docs: |-
  Cette ressource permet de créer un fournisseur pour un ou plusieurs clients.

  La réponse fournit un suivi par identifiant client:
  - **processed**: Fournisseurs créés avec la liste des clients traités avec succès
  - **unprocessed**: Clients pour lesquels la création a échoué, avec la raison et le code d'erreur
  - **pending**: Fournisseurs en attente de validation avec leurs clients associés

  Les codes d'erreur possibles sont:
  - ERR_COMPANY_NOT_FOUND: Client non trouvé
  - ERR_PERMISSION_DENIED: Permission refusée
  - ERR_RELATIONSHIP_EXISTS: Relation fournisseur déjà existante
  - ERR_ACCOUNTING_PERMISSION_DENIED: Permission comptabilité refusée
