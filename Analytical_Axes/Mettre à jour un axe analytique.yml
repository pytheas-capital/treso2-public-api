http:
  method: PATCH
  url: "{{baseUrl}}/v3/analytical-axes/:analyticalAxisId"
  params:
    - name: analyticalAxisId
      value: "AXIS-2026-001"
      type: path
  body:
    type: json
    data: |-
      {
        "companyId": "0199cd10-4c11-7199-b0df-6747d1f3691a",
        "key": "DEPARTMENT",
        "label": "Département",
        "analyticalCodes": [
          {
            "code": "DEPT001",
            "label": "Département des ventes",
            "active": true
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

