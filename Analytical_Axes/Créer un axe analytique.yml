info:
  name: Créer un axe analytique
  type: http
  seq: 2
  tags:
    - Analytical_Axes

http:
  method: POST
  url: "{{baseUrl}}/v3/analytical-axes"
  body:
    type: json
    data: |-
      {
        "key": "DEPARTMENT",
        "label": "Département",
        "analyticalCodes": [
          {
            "code": "DEPT001",
            "label": "Département des ventes",
            "active": true
          }
        ],
        "company": {
          "companyRegistrationId": "807708243",
          "subsidiaryRegistrationId": "80770824300066"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

