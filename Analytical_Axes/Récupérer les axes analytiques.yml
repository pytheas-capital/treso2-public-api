info:
  name: Récupérer les axes analytiques
  type: http
  seq: 1
  tags:
    - Analytical_Axes

http:
  method: GET
  url: "{{baseUrl}}/v3/analytical-axes"
  params:
    - name: offset
      value: "1"
      type: query
      description: Numéro de page souhaité
    - name: limit
      value: "25"
      type: query
      description: Nombre d'éléments à retourner par page (Maximum 100)
    - name: companyRegistrationId
      value: 807708243
      type: query
      description: Identifiant de l'entreprise (SIREN, NIF, DUNS). Veuillez sélectionner l'identifiant de la maison mère.
    - name: subsidiaryRegistrationId
      value: 80770824300066
      type: query
      description: Identifiant de l'établissement (SIRET). Veuillez sélectionner l'identifiant de la maison mère. Ce champs est REQUIRED si la maison mère comporte plusieurs SIRET.
    - name: key
      value: "DEPARTMENT"
      type: query
      description: Clé de l'axe analytique
      disabled: true
    - name: label
      value: "Département"
      type: query
      description: Label de l'axe analytique
      disabled: true
    - name: sort
      value: updatedAt-asc
      type: query
      description: Tri par nom de champ, suffixer avec '-asc' pour ascendant et '-desc' pour descendant
      disabled: true
    - name: sort
      value: updatedAt-desc
      type: query
      description: Tri par nom de champ, suffixer avec '-asc' pour ascendant et '-desc' pour descendant
      disabled: true
    - name: sort
      value: createdAt-asc
      type: query
      description: Tri par nom de champ, suffixer avec '-asc' pour ascendant et '-desc' pour descendant
      disabled: true
    - name: sort
      value: createdAt-desc
      type: query
      description: Tri par nom de champ, suffixer avec '-asc' pour ascendant et '-desc' pour descendant
      disabled: true
    - name: sort
      value: key-asc
      type: query
      description: Tri par nom de champ, suffixer avec '-asc' pour ascendant et '-desc' pour descendant
      disabled: true
    - name: sort
      value: key-desc
      type: query
      description: Tri par nom de champ, suffixer avec '-asc' pour ascendant et '-desc' pour descendant
      disabled: true
    - name: sort
      value: label-asc
      type: query
      description: Tri par nom de champ, suffixer avec '-asc' pour ascendant et '-desc' pour descendant
      disabled: true
    - name: sort
      value: label-desc
      type: query
      description: Tri par nom de champ, suffixer avec '-asc' pour ascendant et '-desc' pour descendant
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

