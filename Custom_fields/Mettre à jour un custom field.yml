info:
  name: Mettre à jour un custom field
  type: http
  seq: 1
  tags:
    - Custom_fields

http:
  method: PATCH
  url: "{{baseUrl}}/v3/custom-fields/:id"
  params:
    - name: id
      value: "CF-2026-001"
      type: path
  body:
    type: json
    data: |-
      {
        "key": "internalKey",
        "name": "Clé interne",
        "type": "MULTIPLE",
        "companyId": "0199cd10-4c11-7199-b0df-6747d1f3691a",
        "description": "Champ métier interne utilisé pour le rapprochement",
        "required": false,
        "values": [
          {
            "value": "INTERNAL_A",
            "description": "Champ métier interne utilisé pour le rapprochement"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

