info:
  name: Rattacher un fichier PDF à un bon de commande
  type: http
  seq: 6
  tags:
    - Purchase_Orders

http:
  method: POST
  url: "{{baseUrl}}/v3/purchase-orders/:purchaseOrderId/file"
  params:
    - name: purchaseOrderId
      value: "POID-2026-001"
      type: path
      description: Identifiant du bon de commande auto généré par la plateforme.
  body:
    type: json
    data: |-
      {
        "name": "purchase-order.pdf"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

