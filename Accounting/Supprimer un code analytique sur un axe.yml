info:
  name: Supprimer un code analytique sur un axe
  type: http
  seq: 8
  tags:
    - Accounting

http:
  method: DELETE
  url: "{{baseUrl}}/v3/accounting/:id/ledger-entry/:accountNumber/axes/:axisKey/analytical-code/:code"
  params:
    - name: id
      value: ""
      type: path
      description: Identifiant de la facture ou de l'avoir
    - name: accountNumber
      value: ""
      type: path
      description: Numéro de compte comptable
    - name: axisKey
      value: ""
      type: path
      description: La clé de l'axe analytique
    - name: code
      value: ""
      type: path
      description: Le code analytique à supprimer
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

