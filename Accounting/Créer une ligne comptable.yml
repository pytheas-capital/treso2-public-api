info:
  name: Créer une ligne comptable
  type: http
  seq: 1
  tags:
    - Accounting

http:
  method: POST
  url: "{{baseUrl}}/v3/accounting/:id/ledger-entry"
  params:
    - name: id
      value: ""
      type: path
      description: Identifiant de la facture ou de l'avoir
  body:
    type: json
    data: |-
      {
        "accountNumber": "A102030",
        "auxiliaryAccountNumber": "FOURNISSEUR",
        "description": "Charges d'exploitation",
        "vatCode": "VAT20",
        "amount": "2000",
        "type": "DEBIT",
        "axes": [
          {
            "axisKey": "DEPARTEMENT",
            "codes": [
              {
                "code": "DEPT001",
                "amount": 2000
              }
            ]
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

