info:
  name: Mettre à jour un code analytique sur un axe
  type: http
  seq: 7
  tags:
    - Accounting

http:
  method: PATCH
  url: "{{baseUrl}}/v3/accounting/:id/ledger-entry/:accountNumber/axes/:axisKey/analytical-code/:code"
  params:
    - name: id
      value: "123e4567-e89b-12d3-a456-426614174000"
      type: path
      description: Identifiant de la facture ou de l'avoir
    - name: accountNumber
      value: "401000"
      type: path
      description: Numéro de compte comptable
    - name: axisKey
      value: "DEPARTMENT"
      type: path
      description: La clé de l'axe analytique
    - name: code
      value: "DEPT001"
      type: path
      description: Le code analytique à mettre à jour
  body:
    type: json
    data: |-
      {
        "code": "DEPT001",
        "amount": "2000"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

