info:
  name: Ajouter un code analytique à un axe
  type: http
  seq: 6
  tags:
    - Accounting

http:
  method: POST
  url: "{{baseUrl}}/v3/accounting/:id/ledger-entry/:accountNumber/axes/:axisKey/analytical-code"
  params:
    - name: id
      value: "123e4567-e89b-12d3-a456-426614174000"
      type: path
      description: Identifiant de la facture ou de l'avoir
    - name: accountNumber
      value: "401000"
      type: path
      description: Numéro de compte comptable
    - name: axisKey
      value: "DEPARTMENT"
      type: path
      description: La clé de l'axe analytique
  body:
    type: json
    data: |-
      {
        "code": "DEPT001",
        "amount": "2000"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

