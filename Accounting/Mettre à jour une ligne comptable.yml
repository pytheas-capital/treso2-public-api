info:
  name: Mettre à jour une ligne comptable
  type: http
  seq: 2
  tags:
    - Accounting

http:
  method: PATCH
  url: "{{baseUrl}}/v3/accounting/:id/ledger-entry/:accountNumber"
  params:
    - name: id
      value: ""
      type: path
      description: Identifiant de la facture ou de l'avoir
    - name: accountNumber
      value: ""
      type: path
      description: Numéro de compte de la ligne comptable
  body:
    type: json
    data: |-
      {
        "accountNumber": "A102030",
        "auxiliaryAccountNumber": "FOURNISSEUR",
        "description": "Charges d'exploitation",
        "vatCode": "VAT20",
        "amount": "2000",
        "type": "DEBIT"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

