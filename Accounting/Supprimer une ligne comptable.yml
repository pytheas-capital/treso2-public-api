http:
  method: DELETE
  url: "{{baseUrl}}/v3/accounting/:id/ledger-entry/:accountNumber"
  params:
    - name: id
      value: "123e4567-e89b-12d3-a456-426614174000"
      type: path
      description: Identifiant de la facture ou de l'avoir
    - name: accountNumber
      value: "401000"
      type: path
      description: Numéro de compte de la ligne comptable
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

