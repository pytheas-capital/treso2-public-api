info:
  name: Récupérer l'ensemble de mes sociétés
  type: http
  seq: 1
  tags:
    - Entity_management

http:
  method: GET
  url: "{{baseUrl}}/v3/companies/my-companies"
  params:
    - name: offset
      value: "1"
      type: query
      description: Numéro de page souhaité
    - name: limit
      value: "25"
      type: query
      description: Nombre d'éléments à retourner par page (Maximum 100)
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: La liste des entreprises accessibles à l'utilisateur avec métadonnées de pagination
    request:
      url: "{{baseUrl}}/v3/companies/my-companies"
      method: GET
      params:
        - name: offset
          value: "1"
          type: query
          description: Numéro de page souhaité
        - name: limit
          value: "25"
          type: query
          description: Nombre d'éléments à retourner par page (Maximum 100)
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "companies": [
              {
                "parentId": null,
                "parentName": null,
                "companyId": "0199cd10-4c11-7199-b0df-6747d1f3691a",
                "siren": "807708243",
                "siret": "80770824300066",
                "vatNumber": "FR42807708243",
                "companyName": "Pytheas Capital Advisors",
                "street": "10 rue de la Paix",
                "zipCode": "75002",
                "city": "Paris",
                "country": "FR",
                "createdAt": "2026-01-15T10:00:00.000Z",
                "updatedAt": "2026-04-01T09:30:00.000Z"
              }
            ],
            "totalCount": 50,
            "page": 1,
            "limit": 25,
            "totalPages": 2
          }
  - name: 401 Response
    description: L'utilisateur n'est pas authentifié
    request:
      url: "{{baseUrl}}/v3/companies/my-companies"
      method: GET
      params:
        - name: offset
          value: "1"
          type: query
          description: Numéro de page souhaité
        - name: limit
          value: "25"
          type: query
          description: Nombre d'éléments à retourner par page (Maximum 100)
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
  - name: 403 Response
    description: L'utilisateur n'est pas autorisé à effectuer l'action
    request:
      url: "{{baseUrl}}/v3/companies/my-companies"
      method: GET
      params:
        - name: offset
          value: "1"
          type: query
          description: Numéro de page souhaité
        - name: limit
          value: "25"
          type: query
          description: Nombre d'éléments à retourner par page (Maximum 100)
    response:
      status: 403
      statusText: Forbidden
      body:
        type: text
        data: ""
  - name: 500 Response
    description: Une erreur de serveur inattendue s'est produite
    request:
      url: "{{baseUrl}}/v3/companies/my-companies"
      method: GET
      params:
        - name: offset
          value: "1"
          type: query
          description: Numéro de page souhaité
        - name: limit
          value: "25"
          type: query
          description: Nombre d'éléments à retourner par page (Maximum 100)
    response:
      status: 500
      statusText: Internal Server Error
