docs: "Cette ressource permet de récupérer la liste des entreprises auxquelles l'utilisateur authentifié a accès en lecture.

  \    </br>

  \    Pour chaque entreprise, les informations suivantes sont retournées :

  \    <ul>

  \      <li><b>parentId</b> : Identifiant technique de la société parente (null si pas de parent)</li>

  \      <li><b>parentName</b> : Nom de la société parente (null si pas de parent)</li>

  \      <li><b>companyId</b> : Identifiant technique de la société</li>

  \      <li><b>siren</b> : SIREN de la société</li>

  \      <li><b>siret</b> : SIRET de la société</li>

  \      <li><b>vatNumber</b> : Numéro de TVA de la société</li>

  \      <li><b>companyName</b> : Nom de la société</li>

  \      <li><b>street</b> : Adresse de la société</li>

  \      <li><b>zipCode</b> : Code postal de la société</li>

  \      <li><b>city</b> : Ville de la société</li>

  \      <li><b>country</b> : Pays de la société</li>

  \      <li><b>createdAt</b> : Date de création</li>

  \      <li><b>updatedAt</b> : Date de dernière modification</li>

  \    </ul>

  \    </br>

  \    Les entreprises sont paginées avec un maximum de 25 éléments par page par défaut.

  \    </br>

  \    Si aucune entreprise n'est trouvée, un tableau vide sera retourné.

  \    "
