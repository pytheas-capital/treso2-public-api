docs: "Cette ressource permet de récupérer la liste des filiales d'une entreprise parente via son identifiant.

  \    </br>

  \    Pour chaque filiale, les informations suivantes sont retournées :

  \    <ul>

  \      <li><b>companyId</b> : Identifiant technique de la société</li>

  \      <li><b>siren</b> : SIREN de la société</li>

  \      <li><b>siret</b> : SIRET de la société</li>

  \      <li><b>vatNumber</b> : Numéro de TVA de la société</li>

  \      <li><b>companyName</b> : Nom de la société</li>

  \      <li><b>street</b> : Adresse de la société</li>

  \      <li><b>zipCode</b> : Code postal de la société</li>

  \      <li><b>city</b> : Ville de la société</li>

  \      <li><b>country</b> : Pays de la société</li>

  \      <li><b>createdAt</b> : Date de création</li>

  \      <li><b>updatedAt</b> : Date de dernière modification</li>

  \    </ul>

  \    </br>

  \    L'utilisateur doit avoir les permissions de lecture sur l'entreprise parente.

  \    </br>

  \    Les filiales sont paginées avec un maximum de 25 éléments par page par défaut.

  \    </br>

  \    Si aucune filiale n'est trouvée, un tableau vide sera retourné.

  \    </br>

  \    Si l'entreprise parente n'est pas trouvée, une erreur 404 sera retournée.

  \    </br>

  \    Si l'utilisateur n'a pas les permissions, une erreur 403 sera retournée.

  \    "
