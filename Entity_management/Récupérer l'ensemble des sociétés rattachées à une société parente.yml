info:
  name: Récupérer l'ensemble des sociétés rattachées à une société parente
  type: http
  seq: 2
  tags:
    - Entity_management

http:
  method: GET
  url: "{{baseUrl}}/v3/companies/:companyId/subsidiaries"
  params:
    - name: companyId
      value: "0199cd10-4c11-7199-b0df-6747d1f3691a"
      type: path
      description: Identifiant unique de l'entreprise parente. Pour le récupérer, vous pouvez effectuer une recherche à partir de la route "Récupérer mes entreprises".
    - name: offset
      value: "1"
      type: query
      description: Numéro de page souhaité
    - name: limit
      value: "25"
      type: query
      description: Nombre d'éléments à retourner par page (Maximum 100)
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

